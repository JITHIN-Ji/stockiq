<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{% block meta_description %}StockIQ — Instant investor intelligence for Indian stocks{% endblock %}">
  <title>{% block title %}StockIQ — Investor Intelligence{% endblock %}</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <!-- StockIQ CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">

  {% block extra_head %}{% endblock %}
</head>
<body>

  <!-- ── Navigation ──────────────────────────────────────────────────────── -->
  <nav class="siq-nav">
    <div class="container-xl d-flex align-items-center justify-content-between">
      <a href="{{ url_for('main.index') }}" class="siq-logo">
        <span class="logo-mark">S</span>
        <span class="logo-text">Stock<em>IQ</em></span>
      </a>

      <form class="nav-search-form" action="{{ url_for('main.search') }}" method="GET">
        <div class="nav-search-wrap">
          <i class="bi bi-search"></i>
          <input type="text" name="q" placeholder="Search stocks…" autocomplete="off" id="navSearchInput">
          <div class="nav-autocomplete" id="navAutocomplete"></div>
        </div>
      </form>

      <div class="nav-actions">
        <a href="{{ url_for('main.index') }}" class="nav-link {% if request.endpoint == 'main.index' %}active{% endif %}">Home</a>
        <a href="{{ url_for('api.get_all_stocks') }}" class="nav-link" target="_blank">API</a>
      </div>
    </div>
  </nav>

  <!-- ── Main Content ────────────────────────────────────────────────────── -->
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- ── Footer ─────────────────────────────────────────────────────────── -->
  <footer class="siq-footer">
    <div class="container-xl">
      <div class="footer-inner">
        <div class="footer-brand">
          <span class="logo-mark small">S</span>
          <span class="footer-tagline">Stock<em>IQ</em> — Investor Intelligence</span>
        </div>
        <p class="footer-disclaimer">
          For educational purposes only. Not investment advice.
          Data sourced from public financial disclosures.
        </p>
        <p class="footer-copy">© 2024 StockIQ MVP</p>
      </div>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
